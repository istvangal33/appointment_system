<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Időpontfoglalás</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .container { max-width: 600px; margin-top: 50px; }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="mb-4 text-center">Időpontfoglalás</h2>
    <form id="bookingForm">
      <div class="mb-3">
        <label for="business" class="form-label">Szolgáltatás típusa</label>
        <select class="form-select" id="business" name="business">
          <option value="masszazs">Masszázs</option>
          <option value="fodrasz">Fodrász</option>
          <option value="kozmetika">Kozmetika</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="name" class="form-label">Név</label>
        <input type="text" class="form-control" id="name" name="name" required>
      </div>
      <div class="mb-3">
        <label for="phone" class="form-label">Telefonszám</label>
        <input type="tel" class="form-control" id="phone" name="phone" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>
      <div class="mb-3">
        <label for="date" class="form-label">Dátum</label>
        <input type="text" class="form-control" id="date" name="date" required>
      </div>
      <div class="mb-3">
        <label for="time" class="form-label">Időpont</label>
        <select class="form-select" id="time" name="time" required>
          <option value="">Válassz időpontot</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-100">Foglalás</button>
    </form>
    <div id="confirmation" class="alert alert-success mt-4 d-none">Foglalás sikeres!</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Simple static implementation for form.html
    flatpickr("#date", {
      dateFormat: "Y-m-d",
      minDate: "today",
      disable: [
        // Disable Sundays
        function(date) {
          return (date.getDay() === 0);
        }
      ],
      onChange: function(selectedDates, dateStr) {
        if (dateStr) {
          generateStaticTimes(dateStr);
        }
      }
    });

    function generateStaticTimes(date) {
      const selectedDate = new Date(date);
      const dayOfWeek = selectedDate.getDay();
      const timeSelect = document.getElementById("time");
      
      timeSelect.innerHTML = '<option value="">Válassz időpontot</option>';
      
      let availableTimes = [];
      
      if (dayOfWeek >= 1 && dayOfWeek <= 5) { // Monday-Friday
        availableTimes = ['9:00', '10:00', '11:00', '14:00', '15:00', '16:00', '17:00'];
      } else if (dayOfWeek === 6) { // Saturday
        availableTimes = ['9:00', '10:00', '11:00', '12:00', '13:00'];
      }
      
      // Filter out already booked times from localStorage
      const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
      const bookedTimes = bookings
        .filter(booking => booking.date === date)
        .map(booking => booking.time);
      
      const freeTimes = availableTimes.filter(time => !bookedTimes.includes(time));
      
      if (freeTimes.length > 0) {
        freeTimes.forEach(time => {
          const option = document.createElement("option");
          option.value = time;
          option.textContent = time;
          timeSelect.appendChild(option);
        });
      } else {
        timeSelect.innerHTML = '<option value="">Nincs szabad időpont ezen a napon</option>';
      }
    }

    document.getElementById("bookingForm").addEventListener("submit", function(e) {
      e.preventDefault();
      
      // Simple validation
      const requiredFields = ['business', 'name', 'phone', 'email', 'date', 'time'];
      const isValid = requiredFields.every(field => {
        const element = document.getElementById(field);
        return element && element.value.trim();
      });
      
      if (!isValid) {
        alert('Kérjük töltse ki az összes mezőt!');
        return;
      }
      
      // Save to localStorage
      const formData = {
        business: document.getElementById("business").value,
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        email: document.getElementById("email").value.trim(),
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        timestamp: new Date().toISOString(),
        id: Date.now() + Math.random()
      };
      
      const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
      bookings.push(formData);
      localStorage.setItem('bookings', JSON.stringify(bookings));
      
      // Show success message
      document.getElementById("confirmation").classList.remove("d-none");
      this.reset();
      
      // Reset time select
      document.getElementById("time").innerHTML = '<option value="">Válassz időpontot</option>';
    });
  </script>
</body>
</html>
