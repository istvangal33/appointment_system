{% extends 'foglalas/base.html' %}

{% block title %}Bejelentkezés - Időpontfoglalórendszer{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Bejelentkezés</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Felhasználónév</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Jelszó</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Bejelentkezés
                    </button>
                </form>
            </div>
            <div class="card-footer text-muted text-center">
                <small>Demo felhasználók: superadmin, admin, customer</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
