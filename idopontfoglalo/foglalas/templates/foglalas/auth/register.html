{% extends 'foglalas/base.html' %}

{% block title %}Regisztráció{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header text-center">
                <h3>Regisztráció</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Felhasználónév</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Jelszó</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="password2" class="form-label">Jelszó megerősítése</label>
                        <input type="password" class="form-control" id="password2" name="password2" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Regisztráció</button>
                </form>
                
                <hr>
                <div class="text-center">
                    <p class="mb-0">Már van fiókja?</p>
                    <a href="{% url 'login' %}" class="btn btn-outline-primary">Bejelentkezés</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
